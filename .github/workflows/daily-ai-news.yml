name: Daily AI Hot News

on:
  schedule:
    # 每天中午12点(北京时间)运行
    # 北京时间 = UTC+8，所以 12 PM 北京时间 = 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  generate-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Hexo and theme
        run: |
          npm install -g hexo-cli
          npm install hexo-generator-sitemap hexo-generator-feed
          git clone https://github.com/hexojs/hexo-theme-landscape.git themes/landscape
          test -d themes/landscape && echo "THEME OK" || echo "THEME NOT FOUND"
          ls -la themes/landscape/

      - name: Install dependencies
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install feedparser requests

      - name: Fetch AI Hot News
        run: python ai_scripts/fetch_news.py

      - name: Generate Article
        run: python ai_scripts/generate_article.py

      - name: Generate static site
        run: |
          node -e "const Hexo = require('hexo'); const hexo = new Hexo('./', {silent: false}); hexo.init().then(() => hexo.call('generate', {})).then(() => hexo.exit()).catch(e => { console.error(e); hexo.exit(1); });"

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch public/.nojekyll
          cd public
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "AI日报: $(date +'%Y-%m-%d') 全球AI热点 [skip ci]"
          git push --force origin main:main